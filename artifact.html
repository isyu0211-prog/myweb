<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的日记</title>
<style>
:root{
  --bg:#e8ecf2;
  --card:#f8f9fb;
  --text:#1a2a3a;
  --sub:#7a8ea0;
  --accent:#003d74;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;min-height:100dvh;
  padding:24px 20px 60px;
  max-width:500px;
  margin:0 auto;
}
h1{
  font-size:1.2rem;font-weight:600;
  letter-spacing:-0.01em;margin-bottom:4px;
}
.today{
  font-size:0.68rem;color:var(--sub);
  margin-bottom:18px;
}
.entry{
  background:var(--card);border-left:3px solid var(--accent);
  border-radius:2px 10px 10px 2px;
  padding:20px 20px 20px 17px;margin-bottom:12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
}
.entry-head{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:8px;
}
.entry-time{
  font-size:0.7rem;color:var(--sub);
}
.entry-mood{
  font-size:1.1rem;
}
.entry-text{
  font-size:0.85rem;line-height:1.7;color:#5a6a7a;
  white-space:pre-wrap;word-break:break-word;
}
</style>
</head>
<body>

<h1>我的日记</h1>
<div class="today" id="today"></div>

<!-- Claude：每次新增日记条目的卡片加在这里，放在已有条目上方 -->
<div class="entry">
  <div class="entry-head">
    <span class="entry-time">2026年6月14日 18:30 星期日</span>
    <span class="entry-mood">💬</span>
  </div>
  <div class="entry-text">这里会显示聊天小记。Claude 每次更新都会保留之前的记录。</div>
</div>

<script>
var n=new Date();
var d=['日','一','二','三','四','五','六'];
document.getElementById('today').textContent=
  n.getFullYear()+'年'+(n.getMonth()+1)+'月'+n.getDate()+'日 星期'+d[n.getDay()];
</script>
</body>
</html>
