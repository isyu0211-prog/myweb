<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>我的日记</title>
<style>
:root{
  --bg:#dedede;
  --card:#f5f5f5;
  --text:#2c2c2c;
  --sub:#999;
  --line:#d5d5d5;
  --accent:#666;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;min-height:100dvh;
  padding:24px 20px 60px;
  max-width:500px;
  margin:0 auto;
}
.date{
  font-size:0.8rem;
  color:var(--sub);
  letter-spacing:0.04em;
  margin-bottom:6px;
}
h1{
  font-size:1.5rem;
  font-weight:600;
  letter-spacing:-0.01em;
  margin-bottom:20px;
}
.mood-row{
  display:flex;
  gap:10px;
  margin-bottom:18px;
  flex-wrap:wrap;
}
.mood{
  width:40px;height:40px;
  border-radius:20px;
  border:1px solid var(--line);
  background:var(--card);
  font-size:1.2rem;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;
}
.mood:active{transform:scale(0.93)}
.mood.on{border-color:var(--accent);background:#eee}
.card{
  background:var(--card);
  border-radius:12px;
  padding:20px;
  box-shadow:0 1px 2px rgba(0,0,0,0.04);
  margin-bottom:16px;
}
textarea{
  width:100%;min-height:240px;
  border:none;outline:none;
  background:transparent;
  font:1rem/1.8 -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  color:var(--text);
  resize:vertical;
  letter-spacing:0.02em;
}
textarea::placeholder{color:#c0c0c0}
.btns{display:flex;gap:10px}
.btn{
  flex:1;padding:12px;border-radius:10px;
  border:none;font-size:0.9rem;font-weight:500;
  cursor:pointer;transition:all 0.2s;
}
.btn:active{transform:scale(0.97)}
.btn-save{background:var(--text);color:#fff}
.btn-clear{background:var(--card);color:var(--sub);border:1px solid var(--line)}
.toast{
  position:fixed;top:24px;left:50%;
  transform:translateX(-50%) translateY(-120px);
  background:rgba(44,44,44,0.9);color:#fff;
  padding:10px 24px;border-radius:20px;
  font-size:0.85rem;z-index:99;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;backdrop-filter:blur(8px);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.list{margin-top:24px}
.list-title{font-size:0.75rem;color:var(--sub);letter-spacing:0.06em;margin-bottom:10px}
.entry{
  background:var(--card);border-radius:10px;
  padding:14px 16px;margin-bottom:8px;
  cursor:pointer;transition:all 0.2s;
  box-shadow:0 1px 2px rgba(0,0,0,0.03);
  position:relative;
}
.entry:active{background:#f5f5f5}
.entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.entry-date{font-size:0.75rem;color:var(--sub)}
.entry-mood{font-size:1rem}
.entry-text{font-size:0.9rem;color:#666;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.entry-del{
  position:absolute;top:8px;right:10px;
  background:none;border:none;font-size:0.85rem;
  cursor:pointer;color:#ccc;padding:2px;opacity:0;
}
.entry:hover .entry-del,.entry:active .entry-del{opacity:1}
.empty{text-align:center;padding:40px 20px;color:#ccc;font-size:0.9rem}
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.3);
  z-index:100;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-sheet{
  background:var(--card);border-radius:16px 16px 0 0;
  width:100%;max-width:500px;max-height:75vh;overflow-y:auto;
  padding:20px 20px 36px;box-shadow:0 -4px 30px rgba(0,0,0,0.08);
  transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-handle{width:32px;height:3px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal-date{font-size:0.8rem;color:var(--sub);text-align:center}
.modal-mood{text-align:center;font-size:1.8rem;margin:6px 0 10px}
.modal-content{font-size:1rem;line-height:1.9;color:var(--text);white-space:pre-wrap;word-break:break-word}
.modal-close{
  display:block;margin:20px auto 0;padding:10px 40px;
  border-radius:10px;border:none;background:var(--text);
  color:#fff;font-size:0.9rem;cursor:pointer;
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="date" id="dateEl"></div>
<h1>我的日记</h1>

<div class="mood-row" id="moodRow">
  <button class="mood" data-m="☺️">☺️</button>
  <button class="mood" data-m="😆">😆</button>
  <button class="mood" data-m="😳">😳</button>
  <button class="mood" data-m="🤨">🤨</button>
  <button class="mood" data-m="🥺">🥺</button>
  <button class="mood" data-m="☹️">☹️</button>
  <button class="mood" data-m="😣">😣</button>
  <button class="mood" data-m="😭">😭</button>
</div>

<div class="card">
  <textarea id="input" placeholder="今天发生了什么..." maxlength="2000"></textarea>
</div>

<div class="btns">
  <button class="btn btn-save" id="btnSave">保存</button>
  <button class="btn btn-clear" id="btnClear">清空</button>
</div>

<div class="list" id="list">
  <div class="list-title">过往</div>
  <div id="entries"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-date" id="mDate"></div>
    <div class="modal-mood" id="mMood"></div>
    <div class="modal-content" id="mContent"></div>
    <button class="modal-close" id="mClose">关闭</button>
  </div>
</div>

<script>
(function(){
var dateEl=document.getElementById('dateEl');
var moodRow=document.getElementById('moodRow');
var input=document.getElementById('input');
var entriesEl=document.getElementById('entries');
var toast=document.getElementById('toast');
var modal=document.getElementById('modal');
var mDate=document.getElementById('mDate');
var mMood=document.getElementById('mMood');
var mContent=document.getElementById('mContent');
var mood='☺️',editId=null;

function fmt(d){var a=['日','一','二','三','四','五','六'];var h=String(d.getHours()).padStart(2,'0');var m=String(d.getMinutes()).padStart(2,'0');return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+h+':'+m+' 星期'+a[d.getDay()];}
function key(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function toast(msg){toast.textContent=msg;toast.classList.add('show');clearTimeout(toast._t);toast._t=setTimeout(function(){toast.classList.remove('show');},1800);}
function all(){try{return JSON.parse(localStorage.getItem('d')||'[]');}catch(e){return[];}}
function save(a){localStorage.setItem('d',JSON.stringify(a));}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function render(){
  var a=all();
  if(!a.length){entriesEl.innerHTML='<div class="empty">还没有日记</div>';return;}
  entriesEl.innerHTML=a.slice().reverse().map(function(d){return'<div class="entry" onclick="view(\''+d.id+'\')"><button class="entry-del" onclick="event.stopPropagation();del(\''+d.id+'\')">✕</button><div class="entry-head"><span class="entry-date">'+(d.ds||d.date)+'</span><span class="entry-mood">'+(d.mood||'📝')+'</span></div><div class="entry-text">'+esc(d.text)+'</div></div>';}).join('');
}

function saveDiary(){
  var t=input.value.trim();
  if(!t){toast('请先写点什么');input.focus();return;}
  var n=new Date();
  var d={id:editId||Date.now().toString(),date:key(),ds:fmt(n),time:n.toISOString(),mood:mood,text:t};
  var a=all();
  if(editId){a=a.map(function(x){return x.id===editId?d:x;});editId=null;}else{a.push(d);}
  save(a);input.value='';mood='☺️';updateMood();render();toast('已保存');
}

function clearDiary(){input.value='';editId=null;mood='☺️';updateMood();input.focus();toast('已清空');}

function updateMood(){
  moodRow.querySelectorAll('.mood').forEach(function(b){b.classList.toggle('on',b.dataset.m===mood);});
}

function loadToday(){
  var tk=key();
  var a=all();
  var t=a.find(function(d){return d.date===tk;});
  if(t){input.value=t.text;mood=t.mood||'😊';editId=t.id;}else{input.value='';mood='☺️';editId=null;}
  updateMood();
}

window.view=function(id){
  var a=all();
  var d=a.find(function(x){return x.id===id;});
  if(!d)return;
  mDate.textContent=d.ds||d.date;mMood.textContent=d.mood||'📝';mContent.textContent=d.text;
  modal.classList.add('show');document.body.style.overflow='hidden';
};

window.del=function(id){
  if(!confirm('删除这条日记？'))return;
  var a=all();a=a.filter(function(d){return d.id!==id;});save(a);render();toast('已删除');
};

function closeModal(){modal.classList.remove('show');document.body.style.overflow='';}

dateEl.textContent=fmt(new Date());

moodRow.addEventListener('click',function(e){var b=e.target.closest('.mood');if(!b)return;mood=b.dataset.m;updateMood();});
document.getElementById('btnSave').addEventListener('click',saveDiary);
document.getElementById('btnClear').addEventListener('click',clearDiary);
document.getElementById('mClose').addEventListener('click',closeModal);
modal.addEventListener('click',function(e){if(e.target===modal)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){if(document.activeElement===input){e.preventDefault();saveDiary();}}});

var ts=0;
modal.addEventListener('touchstart',function(e){ts=e.touches[0].clientY;});
modal.addEventListener('touchmove',function(e){if(e.touches[0].clientY-ts>60)closeModal();});

updateMood();loadToday();render();
})();
</script>
</body>
</html>
