<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="我的日记">
<link rel="icon" href="https://isyu0211-prog.github.io/myweb/favicon.png?v=3">
<link rel="apple-touch-icon" href="https://isyu0211-prog.github.io/myweb/favicon.png?v=3">
<title>我的日记</title>
<style>
:root{
  --bg:#e8ecf2;
  --card:#f8f9fb;
  --text:#1a2a3a;
  --sub:#7a8ea0;
  --line:#d5dde5;
  --accent:#003d74;
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
body{
  font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;min-height:100dvh;
  padding:24px 20px 60px;
  max-width:360px;
  margin:0 auto;
}
.date{
  font-size:0.6rem;
  color:var(--sub);
  letter-spacing:0.04em;
  margin-bottom:4px;
}
h1{
  font-size:1.1rem;
  font-weight:600;
  letter-spacing:-0.01em;
  margin-bottom:16px;
}
.mood-row{
  display:flex;
  gap:5px;
  margin-bottom:16px;
  flex-wrap:nowrap;
}
.mood{
  width:30px;height:30px;
  border-radius:15px;
  border:1px solid var(--line);
  background:var(--card);
  font-size:0.85rem;
  cursor:pointer;
  transition:all 0.2s;
  display:flex;align-items:center;justify-content:center;
}
.mood:active{transform:scale(0.93)}
.mood.on{border-color:var(--accent);background:#e4edf5}
.card{
  background:var(--card);
  border-left:3px solid var(--accent);
  border-radius:6px 10px 10px 6px;
  padding:20px 12px 20px 12px;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
  margin-bottom:16px;
}
textarea{
  width:100%;min-height:360px;
  border:none;outline:none;
  background:transparent;
  font:0.95rem/1 -apple-system,"PingFang SC","Microsoft YaHei",sans-serif;
  color:var(--text);
  resize:vertical;
  letter-spacing:0.02em;
}
textarea::placeholder{color:#bcc5cd}
.btns{display:flex;gap:10px}
.btn{
  flex:1;padding:12px;border-radius:10px;
  border:none;font-size:0.8rem;font-weight:500;
  cursor:pointer;transition:all 0.2s;
}
.btn:active{transform:scale(0.97)}
.btn-save{background:var(--accent);color:#fff}
.btn-clear{background:var(--card);color:var(--sub);border:1px solid var(--line)}
.toast{
  position:fixed;top:24px;left:50%;
  transform:translateX(-50%) translateY(-120px);
  background:var(--accent);color:#fff;
  padding:10px 24px;border-radius:20px;
  font-size:0.75rem;z-index:99;
  transition:transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  pointer-events:none;backdrop-filter:blur(8px);
}
.toast.show{transform:translateX(-50%) translateY(0)}
.list{margin-top:28px}
.list-title{font-size:0.8rem;font-weight:600;color:var(--text);letter-spacing:0.06em;margin-bottom:14px}
.entry{
  background:var(--card);border-left:3px solid var(--accent);
  border-radius:6px 10px 10px 6px;
  padding:20px 14px 20px 14px;margin-bottom:12px;
  cursor:pointer;transition:all 0.2s;
  box-shadow:0 1px 4px rgba(0,0,0,0.04);
  position:relative;
}
.entry:active{background:#f0f2f5}
.entry-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.entry-date{font-size:0.65rem;color:var(--sub)}
.entry-mood{font-size:1.1rem}
.entry-text{font-size:0.85rem;color:#5a6a7a;overflow:hidden;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;line-height:1.5}
.entry-del{
  position:absolute;top:8px;right:10px;
  background:none;border:none;font-size:0.8rem;
  cursor:pointer;color:#bcc5cd;padding:2px;opacity:0;
}
.entry:hover .entry-del,.entry:active .entry-del{opacity:1}
.empty{text-align:center;padding:40px 20px;color:#bcc5cd;font-size:0.8rem}
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.3);
  z-index:100;display:flex;align-items:flex-end;justify-content:center;
  opacity:0;pointer-events:none;transition:opacity 0.25s;
}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal-sheet{
  background:var(--card);border-left:3px solid var(--accent);
  border-radius:6px 16px 16px 6px;
  width:100%;max-width:500px;max-height:75vh;overflow-y:auto;
  padding:20px 20px 36px 17px;box-shadow:0 -4px 30px rgba(0,0,0,0.06);
  transform:translateY(100%);transition:transform 0.3s cubic-bezier(0.32,0.72,0,1);
}
.modal-overlay.show .modal-sheet{transform:translateY(0)}
.modal-handle{width:32px;height:3px;background:#d5dde5;border-radius:2px;margin:0 auto 16px}
.modal-date{font-size:0.7rem;color:var(--sub);text-align:center}
.modal-mood{text-align:center;font-size:1.5rem;margin:6px 0 10px}
.modal-content{font-size:0.88rem;line-height:1.5;color:var(--text);white-space:pre-wrap;word-break:break-word}
.modal-close{
  display:block;margin:20px auto 0;padding:10px 40px;
  border-radius:10px;border:none;background:var(--accent);
  color:#fff;font-size:0.8rem;cursor:pointer;
}
</style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="date" id="dateEl"></div>
<h1>我的日记</h1>

<div class="mood-row" id="moodRow">
  <button class="mood" data-m="☺️">☺️</button>
  <button class="mood" data-m="😆">😆</button>
  <button class="mood" data-m="😳">😳</button>
  <button class="mood" data-m="🤨">🤨</button>
  <button class="mood" data-m="🥺">🥺</button>
  <button class="mood" data-m="☹️">☹️</button>
  <button class="mood" data-m="😣">😣</button>
  <button class="mood" data-m="😭">😭</button>
</div>

<div class="card">
  <textarea id="input" placeholder="今天发生了什么..." maxlength="2000"></textarea>
</div>

<div class="btns">
  <button class="btn btn-save" id="btnSave">保存</button>
  <button class="btn btn-clear" id="btnClear">清空</button>
</div>
<div class="btns" style="margin-top:6px">
  <button class="btn btn-clear" id="btnExport">📥 导出备份</button>
  <button class="btn btn-clear" id="btnImport">📤 导入恢复</button>
</div>
<input type="file" id="importFile" accept=".json" style="display:none">

<div class="list" id="list">
  <div class="list-title">过往</div>
  <div id="entries"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-date" id="mDate"></div>
    <div class="modal-mood" id="mMood"></div>
    <div class="modal-content" id="mContent"></div>
    <button class="modal-close" id="mClose">关闭</button>
  </div>
</div>

<script>
(function(){
var dE=document.getElementById('dateEl');
var mR=document.getElementById('moodRow');
var inp=document.getElementById('input');
var eEl=document.getElementById('entries');
var toa=document.getElementById('toast');
var mod=document.getElementById('modal');
var mDa=document.getElementById('mDate');
var mMo=document.getElementById('mMood');
var mCo=document.getElementById('mContent');
var mood='☺️',eid=null;

function fmt(d){var a=['日','一','二','三','四','五','六'];var h=String(d.getHours()).padStart(2,'0');var m=String(d.getMinutes()).padStart(2,'0');return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+h+':'+m+' 星期'+a[d.getDay()];}
function key(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function toast(msg){toa.textContent=msg;toa.classList.add('show');clearTimeout(toa._t);toa._t=setTimeout(function(){toa.classList.remove('show');},1800);}
function all(){try{return JSON.parse(localStorage.getItem('d')||'[]');}catch(e){return[];}}
function save(a){localStorage.setItem('d',JSON.stringify(a));}
function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML;}

function render(){
  var a=all();
  if(!a.length){eEl.innerHTML='<div class="empty">还没有日记</div>';return;}
  eEl.innerHTML=a.slice().reverse().map(function(d){return'<div class="entry" onclick="view(\''+d.id+'\')"><button class="entry-del" onclick="event.stopPropagation();del(\''+d.id+'\')">✕</button><div class="entry-head"><span class="entry-date">'+(d.ds||d.date)+'</span><span class="entry-mood">'+(d.mood||'📝')+'</span></div><div class="entry-text">'+esc(d.text)+'</div></div>';}).join('');
}

function saveDiary(){
  var t=inp.value.trim();
  if(!t){toast('请先写点什么');inp.focus();return;}
  var n=new Date();
  var d={id:eid||Date.now().toString(),date:key(),ds:fmt(n),time:n.toISOString(),mood:mood,text:t};
  var a=all();
  if(eid){a=a.map(function(x){return x.id===eid?d:x;});eid=null;}else{a.push(d);}
  save(a);inp.value='';mood='☺️';updateMood();render();toast('已保存');
}

function clearDiary(){inp.value='';eid=null;mood='☺️';updateMood();inp.focus();toast('已清空');}

function updateMood(){
  mR.querySelectorAll('.mood').forEach(function(b){b.classList.toggle('on',b.dataset.m===mood);});
}

function loadToday(){
  var tk=key();
  var a=all();
  var t=a.find(function(d){return d.date===tk;});
  if(t){inp.value=t.text;mood=t.mood||'☺️';eid=t.id;}else{inp.value='';mood='☺️';eid=null;}
  updateMood();
}

window.view=function(id){
  var a=all();
  var d=a.find(function(x){return x.id===id;});
  if(!d)return;
  mDa.textContent=d.ds||d.date;mMo.textContent=d.mood||'📝';mCo.textContent=d.text;
  mod.classList.add('show');document.body.style.overflow='hidden';
};

window.del=function(id){
  if(!confirm('删除这条日记？'))return;
  var a=all();a=a.filter(function(d){return d.id!==id;});save(a);render();toast('已删除');
};

function closeModal(){mod.classList.remove('show');document.body.style.overflow='';}

dE.textContent=fmt(new Date());

mR.addEventListener('click',function(e){var b=e.target.closest('.mood');if(!b)return;mood=b.dataset.m;updateMood();});
document.getElementById('btnSave').addEventListener('click',saveDiary);
document.getElementById('btnClear').addEventListener('click',clearDiary);

// 导出备份
document.getElementById('btnExport').addEventListener('click',function(){
  var a=all();
  if(!a.length){toast('没有可导出的内容');return;}
  var blob=new Blob([JSON.stringify(a,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var el=document.createElement('a');
  el.href=url;el.download='my-diary-backup.json';
  el.click();URL.revokeObjectURL(url);
  toast('备份已下载 ✅');
});

// 导入恢复
document.getElementById('btnImport').addEventListener('click',function(){
  document.getElementById('importFile').click();
});
document.getElementById('importFile').addEventListener('change',function(e){
  var file=e.target.files[0];
  if(!file)return;
  var reader=new FileReader();
  reader.onload=function(ev){
    try{
      var data=JSON.parse(ev.target.result);
      if(!Array.isArray(data))throw new Error();
      var a=all();
      data.forEach(function(d){a.push(d);});
      save(a);render();toast('已导入 '+data.length+' 条');
    }catch(ex){toast('文件格式错误');}
  };
  reader.readAsText(file);
  e.target.value='';
});

document.getElementById('mClose').addEventListener('click',closeModal);
mod.addEventListener('click',function(e){if(e.target===mod)closeModal();});
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){if(document.activeElement===inp){e.preventDefault();saveDiary();}}});

var ts=0;
mod.addEventListener('touchstart',function(e){ts=e.touches[0].clientY;});
mod.addEventListener('touchmove',function(e){if(e.touches[0].clientY-ts>60)closeModal();});

updateMood();loadToday();render();
})();
</script>
</body>
</html>
